<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iPERMIT Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              gov: {
                100: "#e8f5e9",
                300: "#a5d6a7",
                600: "#2e7d32",
                700: "#1f6a29",
                900: "#0f3d16"
              },
              env: {
                100: "#edf7ee",
                700: "#2e7d32"
              },
              warn: {
                100: "#fff4e5",
                600: "#9a5513"
              }
            },
            fontFamily: {
              display: ["Public Sans", "sans-serif"]
            }
          }
        }
      };
    </script>
    <style>
      .field {
        width: 100%;
        margin-top: 0.25rem;
        border: 1px solid rgb(203 213 225);
        border-radius: 0.375rem;
        background: #ffffff;
        padding: 0.5rem 0.75rem;
        font-size: 0.875rem;
        color: rgb(15 23 42);
        outline: none;
      }

      .field:focus {
        border-color: #2e7d32;
        box-shadow: 0 0 0 2px #e8f5e9;
      }

      .btn-primary {
        border-radius: 0.375rem;
        border: 1px solid transparent;
        background: #2e7d32;
        color: #ffffff;
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
        font-weight: 600;
      }

      .btn-primary:hover {
        background: #1f6a29;
      }
    </style>
  </head>
  <body class="min-h-screen bg-white font-display text-slate-900">
    <header class="border-b border-gov-700 bg-gov-900 text-white">
      <div class="mx-auto flex w-full max-w-7xl items-center justify-between px-4 py-3 sm:px-6 lg:px-10">
        <p class="text-xs tracking-wide">Department of Environmental Quality</p>
        <div class="flex items-center gap-3 text-xs tracking-wide">
          <a href="/index.html" class="underline-offset-2 hover:underline">Home</a>
          <a href="/dashboard.html" class="underline-offset-2 hover:underline">Dashboard</a>
        </div>
      </div>
    </header>

    <main class="mx-auto w-full max-w-7xl px-4 py-8 sm:px-6 lg:px-10">
      <section class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
        <h1 class="text-2xl font-bold text-gov-900">Account Access</h1>
        <p class="mt-2 text-sm text-slate-600">Create a regulated entity account or sign in to continue to the dashboard.</p>
      </section>

      <section id="app-notice" class="mt-4 hidden rounded-lg border px-4 py-3 text-sm" role="status" aria-live="polite"></section>

      <section class="mt-6 grid gap-6 lg:grid-cols-5">
        <article class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm lg:col-span-3">
          <h2 class="text-xl font-semibold text-gov-900">Regulated Entity Registration</h2>
          <form id="register-form" class="mt-4 grid gap-3 sm:grid-cols-2">
            <label class="text-sm text-slate-700">
              Contact Person Name
              <input class="field" type="text" name="contact_person_name" autocomplete="name" required />
            </label>
            <label class="text-sm text-slate-700">
              Email
              <input class="field" type="email" name="email" autocomplete="email" required />
            </label>
            <label class="text-sm text-slate-700">
              Password
              <input class="field" type="password" name="password" autocomplete="new-password" required minlength="6" />
            </label>
            <label class="text-sm text-slate-700">
              Organization Name
              <input class="field" type="text" name="organization_name" autocomplete="organization" required />
            </label>
            <label class="text-sm text-slate-700 sm:col-span-2">
              Organization Address
              <textarea class="field" rows="3" name="organization_address" required></textarea>
            </label>
            <div class="rounded-md border border-slate-200 bg-slate-50 p-3 sm:col-span-2">
              <p class="text-xs font-semibold uppercase tracking-wide text-slate-600">Address Helper</p>
              <div class="mt-2 grid gap-2 sm:grid-cols-[1fr_auto]">
                <input id="register-address-search" class="field mt-0" type="text" placeholder="Search address" />
                <button id="register-address-search-btn" class="btn-primary" type="button">Find</button>
              </div>
              <select id="register-address-results" class="field mt-2" size="4"></select>
              <p class="mt-1 text-xs text-slate-500">Choose a suggestion to auto-fill the organization address field.</p>
            </div>
            <div class="sm:col-span-2">
              <button class="btn-primary" type="submit">Create Regulated Entity Account</button>
            </div>
          </form>
        </article>

        <article class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm lg:col-span-2">
          <h2 class="text-xl font-semibold text-gov-900">Account Sign In</h2>
          <form id="login-form" class="mt-4 grid gap-3">
            <label class="text-sm text-slate-700">
              Role
              <select class="field" id="login-role" name="role" required>
                <option value="re">Regulated Entity</option>
                <option value="eo">Environmental Officer</option>
              </select>
            </label>
            <label class="text-sm text-slate-700" id="login-email-label">
              Email (Regulated Entity)
              <input class="field" id="login-email" type="email" name="email" autocomplete="email" placeholder="regulated entity email" required />
            </label>
            <label class="text-sm text-slate-700">
              Password
              <input class="field" type="password" name="password" autocomplete="current-password" required />
            </label>
            <button class="btn-primary" type="submit">Sign In</button>
          </form>
        </article>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
