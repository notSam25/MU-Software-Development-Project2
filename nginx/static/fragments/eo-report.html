<section class="grid gap-4">
  <article class="rounded-lg border border-slate-200 bg-white p-4">
    <h3 class="text-lg font-semibold text-gov-900">
      Environmental Officer Workflow Report
    </h3>
    <p class="mt-1 text-sm text-slate-600">
      Role-restricted report using tracked request state plus live
      submitted-queue count.
    </p>

    <div class="mt-3 flex flex-wrap gap-2">
      <button id="eo-export-csv" class="btn-primary" type="button">Export CSV</button>
      <button id="eo-export-pdf" class="btn-secondary" type="button">Export PDF</button>
    </div>

    <div id="eo-report-summary" class="mt-3 grid gap-3 sm:grid-cols-4"></div>

    <div class="mt-4 overflow-x-auto">
      <table class="min-w-full divide-y divide-slate-200 text-sm">
        <thead>
          <tr class="text-left text-slate-600">
            <th class="px-2 py-2">Request #</th>
            <th class="px-2 py-2">Owner</th>
            <th class="px-2 py-2">Owner Email</th>
            <th class="px-2 py-2">Permit Type</th>
            <th class="px-2 py-2">Activity</th>
            <th class="px-2 py-2">Permit Template ID</th>
            <th class="px-2 py-2">Status</th>
            <th class="px-2 py-2">Permit Record</th>
            <th class="px-2 py-2">Updated</th>
          </tr>
        </thead>
        <tbody id="eo-report-table" class="divide-y divide-slate-200"></tbody>
      </table>
    </div>
  </article>
</section>
