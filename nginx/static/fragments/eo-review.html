<section class="grid gap-4 lg:grid-cols-2">
  <article class="rounded-lg border border-slate-200 bg-white p-4">
    <h3 class="text-lg font-semibold text-gov-900">Submitted Payment Queue</h3>
    <p class="mt-1 text-sm text-slate-600">Requests currently in Submitted status and ready to move into Being Reviewed.</p>
    <div id="eo-review-list" class="mt-3 space-y-2"></div>
  </article>

  <article class="rounded-lg border border-slate-200 bg-white p-4">
    <h3 class="text-lg font-semibold text-gov-900">Start EO Review</h3>
    <form id="eo-start-review-form" class="mt-3 grid gap-3">
      <label class="text-sm text-slate-700">
        Submitted Permit Request
        <select class="field" name="request_id" required></select>
      </label>
      <button class="btn-primary" type="submit">Move To Being Reviewed</button>
    </form>
  </article>
</section>
